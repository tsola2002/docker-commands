version: "3.9"

services:

  order-service:
    image: node-order-service:latest
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - APP_NAME=ORDER-SERVICE
    networks:
      - microservices-network

  customer-service:
    image: node-customer-service:latest
    container_name: customer-service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_NAME=CUSTOMER-SERVICE
      - ORDER_SERVICE=order-service:8081
    depends_on:
      - order-service
    networks:
      - microservices-network

  react-frontend:
    image: react-frontend:latest
    container_name: react-frontend
    ports:
      - "3000:80"
    depends_on:
      - customer-service
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge