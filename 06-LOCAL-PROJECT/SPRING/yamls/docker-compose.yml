version: "3.9"

services:

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - microservices-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    networks:
      - microservices-net

  order-service:
    image: order-service
    container_name: order-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/customerdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8081"
    depends_on:
      - postgres-db
    networks:
      - microservices-net

  customer-service:
    image: customer-service
    container_name: customer-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/customerdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ORDER_SERVICE_URL: http://order-service:8081
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
      - order-service
    networks:
      - microservices-net

  react-frontend:
    image: react-frontend
    container_name: react-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - customer-service
    networks:
      - microservices-net

networks:
  microservices-net:

volumes:
  postgres-data: